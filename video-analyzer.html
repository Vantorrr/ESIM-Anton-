<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Frame Analyzer</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            background: #1a1a1a; 
            color: #fff;
            font-family: monospace;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        video { 
            width: 100%; 
            max-width: 800px; 
            border: 2px solid white; 
            display: block;
            margin-bottom: 20px;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: 1px solid #666;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover {
            background: #444;
        }
        .info {
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #444;
        }
        .frame-info {
            margin: 5px 0;
        }
        canvas {
            display: none;
        }
        .timeline {
            margin: 20px 0;
        }
        input[type="range"] {
            width: 100%;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Frame Analyzer</h1>
        <video id="video" controls>
            <source src="MOJO anim_2.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <div class="info">
            <div class="frame-info">Duration: <span id="duration">--</span>s</div>
            <div class="frame-info">Current Time: <span id="currentTime">0.00</span>s</div>
            <div class="frame-info">Frame: <span id="frameNum">0</span></div>
        </div>

        <div class="timeline">
            <label>Seek: <input type="range" id="seek" min="0" max="100" value="0" step="0.1"></label>
        </div>

        <div class="controls">
            <button onclick="playPause()">Play/Pause</button>
            <button onclick="restart()">Restart</button>
            <button onclick="stepFrame(-1)">← Frame</button>
            <button onclick="stepFrame(1)">Frame →</button>
            <button onclick="slowMotion()">0.25x Speed</button>
            <button onclick="normalSpeed()">1x Speed</button>
        </div>

        <div class="controls">
            <button onclick="seekTo(0)">0.0s</button>
            <button onclick="seekTo(0.5)">0.5s</button>
            <button onclick="seekTo(1.0)">1.0s</button>
            <button onclick="seekTo(1.5)">1.5s</button>
            <button onclick="seekTo(2.0)">2.0s</button>
            <button onclick="seekTo(2.5)">2.5s</button>
            <button onclick="seekTo(3.0)">3.0s</button>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const seekBar = document.getElementById('seek');

        video.addEventListener('loadedmetadata', () => {
            document.getElementById('duration').textContent = video.duration.toFixed(2);
            seekBar.max = video.duration;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        });

        video.addEventListener('timeupdate', () => {
            const currentTime = video.currentTime.toFixed(2);
            document.getElementById('currentTime').textContent = currentTime;
            
            // Estimate frame number (assuming 30fps)
            const frameNum = Math.floor(video.currentTime * 30);
            document.getElementById('frameNum').textContent = frameNum;
            
            seekBar.value = video.currentTime;
        });

        seekBar.addEventListener('input', (e) => {
            video.currentTime = e.target.value;
        });

        function playPause() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        function restart() {
            video.currentTime = 0;
            video.pause();
        }

        function stepFrame(direction) {
            video.pause();
            // Step by 1/30th of a second (assuming 30fps)
            video.currentTime += direction * (1/30);
        }

        function slowMotion() {
            video.playbackRate = 0.25;
        }

        function normalSpeed() {
            video.playbackRate = 1.0;
        }

        function seekTo(time) {
            video.currentTime = time;
            video.pause();
        }

        // Auto-pause at end
        video.addEventListener('ended', () => {
            video.pause();
        });
    </script>
</body>
</html>
