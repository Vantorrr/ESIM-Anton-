<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Frame Analyzer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .video-container {
            position: relative;
            background: #000;
            margin-bottom: 20px;
            border: 2px solid #333;
        }
        video {
            width: 100%;
            display: block;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label {
            font-size: 12px;
            color: #aaa;
        }
        button {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover {
            background: #357abd;
        }
        button:active {
            background: #2a5f8f;
        }
        input[type="range"] {
            width: 100%;
        }
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .info-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }
        .info-box h3 {
            margin-top: 0;
            color: #4a90e2;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #aaa;
        }
        .info-value {
            color: #fff;
            font-weight: bold;
        }
        .canvas-container {
            display: none;
        }
        .timestamp-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Video Frame Analyzer - MOJO Animation</h1>
        
        <div class="timestamp-display" id="timestampDisplay">00:00.000</div>
        
        <div class="video-container">
            <video id="video" controls>
                <source src="client/public/MOJO anim_2.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="controls">
            <div class="control-group">
                <button id="playPauseBtn">⏯️ Play/Pause</button>
            </div>
            <div class="control-group">
                <button id="stepBackBtn">⏮️ -1 Frame</button>
            </div>
            <div class="control-group">
                <button id="stepForwardBtn">⏭️ +1 Frame</button>
            </div>
            <div class="control-group">
                <button id="resetBtn">🔄 Reset to 0:00</button>
            </div>
            <div class="control-group">
                <label>Playback Speed</label>
                <select id="speedControl">
                    <option value="0.25">0.25x</option>
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                </select>
            </div>
            <div class="control-group">
                <label>Jump to Time (seconds)</label>
                <input type="number" id="jumpToTime" step="0.1" min="0" placeholder="0.0">
                <button id="jumpBtn">Jump</button>
            </div>
        </div>

        <div class="info-panel">
            <div class="info-box">
                <h3>Current Frame Info</h3>
                <div class="info-item">
                    <span class="info-label">Current Time:</span>
                    <span class="info-value" id="currentTime">0.000s</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Frame Number:</span>
                    <span class="info-value" id="frameNumber">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">FPS:</span>
                    <span class="info-value" id="fps">30</span>
                </div>
            </div>

            <div class="info-box">
                <h3>Video Info</h3>
                <div class="info-item">
                    <span class="info-label">Duration:</span>
                    <span class="info-value" id="duration">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Resolution:</span>
                    <span class="info-value" id="resolution">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Status:</span>
                    <span class="info-value" id="status">Ready</span>
                </div>
            </div>
        </div>

        <canvas id="canvas" class="canvas-container"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stepBackBtn = document.getElementById('stepBackBtn');
        const stepForwardBtn = document.getElementById('stepForwardBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedControl = document.getElementById('speedControl');
        const jumpToTime = document.getElementById('jumpToTime');
        const jumpBtn = document.getElementById('jumpBtn');
        
        const timestampDisplay = document.getElementById('timestampDisplay');
        const currentTimeDisplay = document.getElementById('currentTime');
        const frameNumberDisplay = document.getElementById('frameNumber');
        const fpsDisplay = document.getElementById('fps');
        const durationDisplay = document.getElementById('duration');
        const resolutionDisplay = document.getElementById('resolution');
        const statusDisplay = document.getElementById('status');

        const FPS = 30; // Assuming 30fps
        const FRAME_DURATION = 1 / FPS;

        video.addEventListener('loadedmetadata', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            durationDisplay.textContent = video.duration.toFixed(3) + 's';
            resolutionDisplay.textContent = `${video.videoWidth}x${video.videoHeight}`;
            fpsDisplay.textContent = FPS;
        });

        video.addEventListener('timeupdate', updateInfo);

        function updateInfo() {
            const currentTime = video.currentTime;
            const frameNumber = Math.floor(currentTime * FPS);
            
            timestampDisplay.textContent = formatTime(currentTime);
            currentTimeDisplay.textContent = currentTime.toFixed(3) + 's';
            frameNumberDisplay.textContent = frameNumber;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 1000);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(3, '0')}`;
        }

        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                statusDisplay.textContent = 'Playing';
            } else {
                video.pause();
                statusDisplay.textContent = 'Paused';
            }
        });

        stepBackBtn.addEventListener('click', () => {
            video.pause();
            video.currentTime = Math.max(0, video.currentTime - FRAME_DURATION);
            statusDisplay.textContent = 'Paused';
        });

        stepForwardBtn.addEventListener('click', () => {
            video.pause();
            video.currentTime = Math.min(video.duration, video.currentTime + FRAME_DURATION);
            statusDisplay.textContent = 'Paused';
        });

        resetBtn.addEventListener('click', () => {
            video.pause();
            video.currentTime = 0;
            statusDisplay.textContent = 'Reset';
        });

        speedControl.addEventListener('change', (e) => {
            video.playbackRate = parseFloat(e.target.value);
        });

        jumpBtn.addEventListener('click', () => {
            const time = parseFloat(jumpToTime.value);
            if (!isNaN(time) && time >= 0 && time <= video.duration) {
                video.currentTime = time;
                video.pause();
                statusDisplay.textContent = 'Jumped';
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                    e.preventDefault();
                    playPauseBtn.click();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    stepBackBtn.click();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    stepForwardBtn.click();
                    break;
                case '0':
                    e.preventDefault();
                    resetBtn.click();
                    break;
            }
        });

        // Initialize
        video.pause();
        video.currentTime = 0;
    </script>
</body>
</html>
